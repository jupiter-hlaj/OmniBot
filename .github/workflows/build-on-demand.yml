name: Build On Demand

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'build/**'
      - 'scripts/**'
      - '.dockerignore'
      - '.github/workflows/build-on-demand.yml'
      - '.github/workflows/routine-buildimage.yml'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Optional tag for the Docker image'
        required: false
        default: ''
        type: string

# Serialize against shared infrastructure (the AKS StatefulSet). Two
# concurrent rollouts would race; queue with cancel-in-progress: false.
concurrency:
  group: deploy-sotto-bot
  cancel-in-progress: false

jobs:
  build:
    uses: ./.github/workflows/routine-buildimage.yml
    with:
      tag: ${{ inputs.tag }}
      cr-namespace-repository: ghcr.io/${{ github.repository_owner }}/omnibot
    permissions:
      packages: write
      contents: read

  deploy:
    name: Roll new image onto sotto-bot AKS StatefulSet
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # OIDC token for Azure login
      contents: read
    env:
      RESOURCE_GROUP: SOTTO-AKS-RG-CENTRAL
      CLUSTER_NAME: sotto-aks-central
      NAMESPACE: sotto-bot
      STATEFULSET: sotto-bot
      CONTAINER: recording-bot
      IMAGE_REPO: ghcr.io/${{ github.repository_owner }}/omnibot
      IMAGE_TAG: ${{ needs.build.outputs.image-tag }}
    steps:
      - name: Checkout chart files
        uses: actions/checkout@v4

      - name: Read chart version
        id: chart
        run: |
          set -euo pipefail
          VERSION=$(grep '^version:' deploy/teams-recording-bot/Chart.yaml | awk '{print $2}')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Chart version: $VERSION"

      - name: Package and push helm chart to GHCR (OCI)
        env:
          # Classic PAT with write:packages scope. Required because the
          # default GITHUB_TOKEN can only update existing packages, not
          # create new ones (the docker image at ghcr.io/jupiter-hlaj/
          # omnibot pre-existed; teams-recording-bot is a fresh package
          # that GITHUB_TOKEN got 403 "installation not allowed to
          # Create organization package" on).
          GHCR_CHART_PAT: ${{ secrets.GHCR_CHART_PAT }}
          OWNER: ${{ github.repository_owner }}
          ACTOR: ${{ github.actor }}
          CHART_VERSION: ${{ steps.chart.outputs.version }}
        run: |
          set -euo pipefail
          # Replaces the previous `tar -czf chart.tgz` + `az aks command
          # invoke --file chart.tgz` flow, which silently corrupted the
          # binary tarball on the way to the cluster's command-invoke pod
          # (tar -xzf inside the cluster failed with "Error is not
          # recoverable: exiting now"). The outer `az aks command invoke`
          # exit code did not surface inner failures, so the workflow
          # exited green for ~2 weeks while no helm upgrade actually
          # ran. Switch to OCI-distributed charts: helm package + helm
          # push to ghcr.io once on the runner, then helm upgrade pulls
          # the chart directly from ghcr.io inside the cluster. No
          # binary uploads, no tar corruption.
          #
          # Chart.yaml declares an ingress-nginx dependency (condition:
          # ingress-nginx.enabled, which is false in values.yaml so it
          # never installs). helm package still requires the dependency
          # tarball to be present in charts/ regardless of the condition,
          # so resolve dependencies before packaging. helm dep update
          # fetches the dependency repo and drops the tarball into
          # charts/.
          helm dependency update deploy/teams-recording-bot
          helm package deploy/teams-recording-bot
          echo "$GHCR_CHART_PAT" | helm registry login ghcr.io -u "$ACTOR" --password-stdin
          helm push "teams-recording-bot-$CHART_VERSION.tgz" "oci://ghcr.io/$OWNER"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Pre-check — AKS cluster must be running
        run: |
          set -euo pipefail
          state=$(az aks show \
            --resource-group "${RESOURCE_GROUP}" \
            --name "${CLUSTER_NAME}" \
            --query 'powerState.code' \
            --output tsv)
          echo "Cluster ${CLUSTER_NAME} powerState=${state}"
          if [ "$state" != "Running" ]; then
            echo "::error title=AKS cluster not running::Cluster '${CLUSTER_NAME}' is in PowerState=${state}, not Running."
            echo "::error::Start it: az aks start --name ${CLUSTER_NAME} --resource-group ${RESOURCE_GROUP}"
            echo "::error::Then re-run this workflow (or push another commit)."
            exit 1
          fi

      - name: Helm upgrade from OCI via az aks command invoke
        env:
          # Same PAT used by the runner-side push above, so the cluster's
          # helm can pull the private chart artifact. Image pulls keep
          # using the existing imagePullSecret pattern; this is helm-only
          # auth for the chart artifact.
          GHCR_CHART_PAT: ${{ secrets.GHCR_CHART_PAT }}
          OWNER: ${{ github.repository_owner }}
          ACTOR: ${{ github.actor }}
          CHART_VERSION: ${{ steps.chart.outputs.version }}
        run: |
          set -euo pipefail
          echo "Helm upgrade ${STATEFULSET} chart=${CHART_VERSION} image=${IMAGE_REPO}:${IMAGE_TAG}"
          # Inner command: registry login (so the cluster can pull the
          # OCI chart from ghcr.io), then helm upgrade. We drop --wait
          # because Windows-image pulls routinely exceed any reasonable
          # helm timeout; the next step (kubectl rollout status) watches
          # async. With --reset-then-reuse-values the new chart's
          # additions land while previously-set per-cluster values
          # (host, ingress.tls.email, public.ip, etc.) are preserved.
          OUTPUT=$(az aks command invoke \
            --resource-group "${RESOURCE_GROUP}" \
            --name "${CLUSTER_NAME}" \
            --command "echo '$GHCR_CHART_PAT' | helm registry login ghcr.io -u '$ACTOR' --password-stdin && helm upgrade ${STATEFULSET} oci://ghcr.io/$OWNER/teams-recording-bot --version $CHART_VERSION --namespace ${NAMESPACE} --reset-then-reuse-values --set image.tag=${IMAGE_TAG}" \
            --query '{exitCode:exitCode,logs:logs}' \
            -o json)
          # Surface the inner logs and exit code regardless of outcome.
          # The previous workflow let the outer `az aks command invoke`
          # success mask any inner helm failure; explicit jq parse + exit
          # propagation is the proper fix.
          echo "$OUTPUT" | jq -r '.logs'
          EXIT_CODE=$(echo "$OUTPUT" | jq -r '.exitCode')
          if [ "$EXIT_CODE" != "0" ]; then
            echo "::error::helm upgrade failed inside the cluster with exit code $EXIT_CODE"
            exit "$EXIT_CODE"
          fi

      - name: Watch rollout (15 min cap)
        run: |
          # StatefulSet rolls in reverse ordinal order; each Windows pod
          # pulls a multi-GB image (5-10 min per pod). 15 min is enough
          # for 3 pods on a warm cluster, sometimes tight on cold ones.
          # If we hit the cap we don't fail the workflow — pods are still
          # rolling on their own timeline.
          az aks command invoke \
            --resource-group "${RESOURCE_GROUP}" \
            --name "${CLUSTER_NAME}" \
            --command "kubectl rollout status statefulset/${STATEFULSET} -n ${NAMESPACE} --timeout=900s" \
            || echo "Rollout did not finish within 15 min; continuing — pods will catch up async."

      - name: Final pod status
        run: |
          az aks command invoke \
            --resource-group "${RESOURCE_GROUP}" \
            --name "${CLUSTER_NAME}" \
            --command "kubectl get pods -n ${NAMESPACE} -o wide"
