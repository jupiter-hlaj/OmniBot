{{- $fullName := include "fullName" . -}}
{{- $namespace := include "namespace" . -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}
  namespace: {{ $namespace }}
  labels:
    helmVersion: {{ .Chart.Version }}
    helmAppVersion: {{ .Chart.AppVersion }}
    helmName: {{ .Chart.Name }}
  annotations:
    cert-manager.io/cluster-issuer: {{ $fullName }}-issuer
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    nginx.ingress.kubernetes.io/server-snippet: |
      location ~* ^({{ include "ingress.path.withTrailingSlash" . }})(?<instance>[0-9]*)/api/calling/notification {
        proxy_pass https://{{ $fullName }}-$instance.{{ $fullName }}.{{ $namespace }}.svc.cluster.local:{{ .Values.internal.port }};
      }
      # Per-pod direct routing for the disclosure announce endpoint.
      # /<ordinal>/sotto/announce -> the per-pod headless DNS for that
      # StatefulSet replica, with the /<ordinal> prefix stripped via
      # rewrite so the bot's controller still matches its fixed
      # /sotto/announce route. The Lambda iterates ordinals 0..N-1 so
      # exactly one pod (the one holding the call in CallRegistry)
      # returns 202; the rest return 404 call_not_on_this_pod. Replaces
      # the old LB-fanout-retry approach which depended on nginx
      # round-robin happening to hit the right pod within 3 attempts.
      location ~* ^/(?<announce_instance>[0-9]+)/sotto/announce$ {
        rewrite ^/[0-9]+/sotto/announce$ /sotto/announce break;
        proxy_pass https://{{ $fullName }}-$announce_instance.{{ $fullName }}.{{ $namespace }}.svc.cluster.local:{{ .Values.internal.port }};
      }
spec:
  ingressClassName: {{ include "ingress-nginx.fullname" .}}
  tls:
  - hosts:
    - {{ include "hostName" . }}
    secretName: {{ include "ingress.tls.secretName" . }}
  rules:
  - host: {{ include "hostName" . }}
    http:
      paths:
      - path: {{ include "ingress.path" . }}
        pathType: Prefix
        backend:
          service:
            name: {{ $fullName }}-routing
            port:
              number: 443